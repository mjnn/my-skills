name: Registry Sync

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'registry.json'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 双向一致性检查
        run: |
          set -e
          FAILED=0

          echo "::group::📋 Registry → Skills 检查"

          # 从 registry.json 提取已登记的 skill 名称
          REG_NAMES=$(jq -r '.skills[]?.name // empty' registry.json)

          for name in $REG_NAMES; do
            if [ ! -d "skills/$name" ]; then
              echo "::error file=registry.json::registry 登记的 '$name' 在 skills/ 目录中不存在"
              FAILED=1
            else
              echo "  ✅ $name — 已登记且目录存在"
            fi
          done

          echo "::endgroup::"
          echo "::group::📁 Skills → Registry 检查"

          # 扫描 skills/ 目录，检查是否都在 registry 中
          for SKILL_DIR in skills/*/; do
            [ -d "$SKILL_DIR" ] || continue
            SKILL_NAME=$(basename "$SKILL_DIR")

            if ! echo "$REG_NAMES" | grep -qx "$SKILL_NAME"; then
              echo "::warning file=${SKILL_DIR}::'$SKILL_NAME' 目录存在但未在 registry.json 中登记"
            fi
          done

          echo "::endgroup::"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Registry 一致性检查未通过"
            exit 1
          fi

          echo ""
          echo "✅ Registry 与 skills/ 目录双向一致"
