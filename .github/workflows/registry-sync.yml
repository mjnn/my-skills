name: Registry Sync

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'registry.json'
      - 'CATALOG.md'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 双向一致性检查
        run: |
          set -e
          FAILED=0

          echo "::group::📋 Registry → Skills 检查"
          jq -c '.skills[]' registry.json | while read -r entry; do
            NAME=$(echo "$entry" | jq -r '.name')
            PATH_EXPECTED=$(echo "$entry" | jq -r '.path')
            if [ ! -d "$PATH_EXPECTED" ]; then
              echo "::error file=registry.json::registry 登记的 '$NAME' 路径 '$PATH_EXPECTED' 不存在"
              FAILED=1
            else
              echo "  ✅ $NAME — $PATH_EXPECTED"
            fi
          done
          echo "::endgroup::"

          echo "::group::📁 Skills → Registry 检查"
          find skills -mindepth 2 -maxdepth 2 -type d | while read -r SKILL_DIR; do
            SKILL_NAME=$(basename "$SKILL_DIR")
            if ! jq -e --arg n "$SKILL_NAME" '.skills[] | select(.name == $n)' registry.json > /dev/null; then
              echo "::warning file=${SKILL_DIR}::'$SKILL_NAME' 目录存在但未在 registry.json 中登记"
            fi
          done
          echo "::endgroup::"

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Registry 一致性检查未通过"
            exit 1
          fi
          echo "✅ Registry 与 skills/ 域目录双向一致"
