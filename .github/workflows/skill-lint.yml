name: Skill Lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 质量门禁
        run: |
          set -e
          FAILED=0
          WARNINGS=0

          while IFS= read -r SKILL_DIR; do
            SKILL_DIR="${SKILL_DIR}/"
            SKILL_NAME=$(basename "$SKILL_DIR")
            SKILL_MD="${SKILL_DIR}SKILL.md"

            echo "::group::🔍 检查 $SKILL_NAME"

            if [ ! -f "$SKILL_MD" ]; then
              echo "::error file=${SKILL_DIR}::缺少 SKILL.md"
              FAILED=1
              echo "::endgroup::"
              continue
            fi

            FM_NAME=$(sed -n '/^---$/,/^---$/p' "$SKILL_MD" | grep '^name:' | head -1 | sed 's/^name: *//' | tr -d '\r')
            if [ "$FM_NAME" != "$SKILL_NAME" ]; then
              echo "::error file=${SKILL_MD}::name 字段 '${FM_NAME}' 与目录名 '${SKILL_NAME}' 不一致"
              FAILED=1
            else
              echo "  ✅ name 字段一致: $FM_NAME"
            fi

            if grep -qnE '(api[_-]?key|apiKey|apikey)\s*[:=]\s*["'"'"']?[a-zA-Z0-9_\-]{16,}' "$SKILL_MD" 2>/dev/null; then
              echo "::error file=${SKILL_MD}::检测到硬编码 API Key"
              FAILED=1
            fi
            if grep -qnE '(token|secret|password)\s*[:=]\s*["'"'"']?[a-zA-Z0-9_\-]{16,}' "$SKILL_MD" 2>/dev/null; then
              echo "::error file=${SKILL_MD}::检测到硬编码 Token/Secret/Password"
              FAILED=1
            fi

            if [ ! -f "${SKILL_DIR}evals/evals.json" ]; then
              echo "::warning file=${SKILL_DIR}::缺少 evals/evals.json"
              WARNINGS=1
            fi

            LINE_COUNT=$(wc -l < "$SKILL_MD")
            if [ "$LINE_COUNT" -gt 500 ]; then
              echo "::error file=${SKILL_MD}::正文 ${LINE_COUNT} 行，超过 500 行上限"
              FAILED=1
            fi

            echo "  ✅ 基本检查通过"
            echo "::endgroup::"
          done < <(find skills -mindepth 2 -maxdepth 2 -type d | sort)

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "✅ 所有 skill 通过质量门禁"
