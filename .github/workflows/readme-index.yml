name: README Index

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'registry.json'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 生成 Skill 索引并更新 README
        run: |
          set -e
          TABLE="| Skill | 域 | 说明 |"
          TABLE="${TABLE}\n|-------|-----|------|"

          jq -c '.skills[]' registry.json | while read -r entry; do
            NAME=$(echo "$entry" | jq -r '.name')
            DOMAIN=$(echo "$entry" | jq -r '.domain')
            PATH_REL=$(echo "$entry" | jq -r '.path')
            SKILL_MD="${PATH_REL}/SKILL.md"
            if [ -f "$SKILL_MD" ]; then
              DESC=$(sed -n '/^---$/,/^---$/p' "$SKILL_MD" | grep '^description:' | head -1 | sed 's/^description: *//' | tr -d '\r')
              DESC=$(echo "$DESC" | sed 's/\.[^.]*$/./')
              TABLE="${TABLE}\n| [${NAME}](${PATH_REL}) | ${DOMAIN} | ${DESC} |"
            fi
          done

          perl -i -0777 -pe "s|(<!-- SKILLS_TABLE_START -->).*(<!-- SKILLS_TABLE_END -->)|\1\n${TABLE}\n\n\2|s" README.md
          echo -e "$TABLE"

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "README 无变化"
          else
            git add README.md
            git commit -m "docs: 自动更新 Skill 索引"
            git push
          fi
